services:
  api:
    # 生产环境：镜像由 GitHub Actions 构建后推送到 ghcr.io
    # 格式：ghcr.io/你的GitHub用户名(小写)/musespace-api:latest
    image: ghcr.io/${GITHUB_USERNAME}/musespace-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: musespace-api
    restart: unless-stopped
    # 不对外暴露端口，只在内部网络供 web 访问
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Llm__ApiKey=${LLM_API_KEY}
      - Llm__BaseUrl=${LLM_BASE_URL}
      - Llm__ModelName=${LLM_MODEL_NAME}
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY}
      - Embedding__ApiKey=${EMBEDDING_API_KEY}
    volumes:
      - ./logs:/app/logs
      - musespace-data:/data # 原著文件等用户数据持久化
    networks:
      - musespace-net

  web:
    image: ghcr.io/${GITHUB_USERNAME}/musespace-web:latest
    build:
      context: ../muse-space-web
      dockerfile: Dockerfile
    container_name: musespace-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - musespace-net

networks:
  musespace-net:
    driver: bridge

volumes:
  musespace-data: # 命名卷，由 Docker 管理，容器重建后数据不丢失
