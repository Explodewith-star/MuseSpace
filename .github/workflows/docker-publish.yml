name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许在 GitHub 页面手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 推送到 ghcr.io 需要此权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ghcr.io 镜像名必须全小写，github.repository_owner 可能含大写
      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ── 构建并推送后端镜像 ──────────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./muse-space # MuseSpace.slnx 和 src/ 都在这里
          file: ./muse-space/muse-space/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/musespace-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 构建并推送前端镜像 ──────────────────────────────────────────
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./muse-space-web
          file: ./muse-space-web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/musespace-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
